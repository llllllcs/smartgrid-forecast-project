{% load static %}
{% load crispy_forms_tags %}
<!doctype html>
<html lang="en">

    <head>
        
        <meta charset="utf-8" />
        <title>登录 | LCAT - 管理员</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta content="Premium Multipurpose Admin & Dashboard Template" name="description" />
        <meta content="Themesdesign" name="author" />
        <!-- App favicon -->
        <link rel="shortcut icon" href="{% static 'images/001.ico' %}">

        <!-- Bootstrap Css -->
        <link href="{% static 'css/bootstrap.min.css' %}" id="bootstrap-style" rel="stylesheet" type="text/css" />
        <!-- Icons Css -->
        <link href="{% static 'css/icons.min.css' %}" rel="stylesheet" type="text/css" />
        <!-- App Css-->
        <link href="{% static 'css/app.min.css' %}" id="app-style" rel="stylesheet" type="text/css" />

    </head>

    <body class="auth-body-bg">
        <div>
            <div class="container-fluid p-0">
                <div class="row g-0">
                    <div class="col-lg-4">
                        <div class="authentication-page-content p-4 d-flex align-items-start min-vh-100 mt-5">
                            <div class="w-100">
                                <div class="mt-4">
                                    <div class="col-lg-12">
                                        <div class="mt-5">
                                            <div class="card-body justify-content-center mt-5">
                                                <div class="justify-content-start mt-5">
                                                    <a href="{% url 'dashboard' %}" class="">
                                                        <img src="{% static 'images/LCAT-logo-dark.png' %}" alt="" height="120" class="auth-logo logo-dark">
                                                        <img src="{% static 'images/LCAT-logo-light.png' %}" alt="" height="120" class="auth-logo logo-light">
                                                    </a>
                                                </div>
                                                <div class="mt-5 p-5">
    
                                                    <h1 class="">欢迎回来</h1>
                                                    <p class="font-size-24">  登陆后可使用LCAT智能圆珠笔工厂管理信息系统</p>
                                                </div>
                                            </div>

                                            <div class="col-lg-10 justify-content-center mx-auto mt-5">
                                                <form class="form-control border border-0" >
                                                    {% csrf_token %}
                                                    {% for message in messages %}
                                                    <div class="alert {{ message.tags }} mb-4" role="alert">
                                                        <strong>{{ message }}</strong>
                                                    </div>
                                                    {% endfor %}                                                 
                                                    <div class="mb-5" id='err-msg' hidden>
                                                        <strong id="msg_err"></strong>
                                                    </div>
                                                    <div class="mb-3 auth-form-group-custom mb-4">
                                                        <i class="ri-user-2-line auti-custom-input-icon"></i>
                                                        <!-- <label for="username">用户名</label>
                                                        <input type="text" class="form-control" id="username" placeholder="Enter username"> -->
                                                        {{ form.username|as_crispy_field }}
                                                    </div>
                            
                                                    <div class="mb-3 auth-form-group-custom mb-4">
                                                        <i class="ri-lock-2-line auti-custom-input-icon"></i>
                                                        {{ form.password|as_crispy_field }}
                                                        <!-- <label for="userpassword">Password</label>
                                                        <input type="password" class="form-control" id="userpassword" placeholder="Enter password"> -->
                                                    </div>
                                                    <div class="row">
                            
                                                        <div class="form-check col-md-5 mx-3 my-2">
                                                            <input type="checkbox" class="form-check-input" id="customControlInline">
                                                            <label class="form-check-label" for="customControlInline">记住我</label>
                                                        </div>
                                                        <div class="text-end col-md-6 my-2 mb-3">
                                                            <a href="{% url 'auth-recoverpw'%}" class="text-muted"><i class="mdi mdi-lock me-1"></i> 忘记密码了？</a>
                                                        </div>
                                                    </div>
                                                    <div class="row mt-5 mb-5">

                                                        <div class="mt-4 text-center col-lg-4">
                                                            <button class="btn btn-dark w-md waves-effect waves-light font-size-22" type="" id="user-login" style="height: 60px; width: 160px">登    录</button>
                                                        </div>
                                                        <div class="mt-4 text-center col-lg-4">
                                                            <button  class="btn btn-outline-dark w-md waves-effect waves-light font-size-22" type="submit" style="height: 60px; width: 160px">注    册</button>
                                                        </div>
                                                    </div>
                                                </form>

                                            </div>

                                            <div class="mx-4 p-5 mt-4 text-start">
                                                <p>© <script>document.write(new Date().getFullYear())</script> LCAT. Crafted with <i class="mdi mdi-heart text-danger"></i> by hyh & lyz & lcy & zyj</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="authentication-bg">
                            <div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- JAVASCRIPT -->
        <script src="{% static 'libs/jquery/jquery.min.js' %}"></script>
        <script src="{% static 'libs/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
        <script src="{% static 'libs/metismenu/metisMenu.min.js' %}"></script>
        <script src="{% static 'libs/simplebar/simplebar.min.js' %}"></script>
        <script src="{% static 'libs/node-waves/waves.min.js' %}"></script>

        <script src="{% static 'js/app.js' %}"></script>

    </body>
</html>
